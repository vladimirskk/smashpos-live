  const dateRO=new Date(selDate+'T12:00:00').toLocaleDateString('ro-RO')
  const dayData=rcData[dateRO]||{soldInitial:0,manualEntries:[]}
  const setSoldInit=v=>setRcData(p=>({...p,[dateRO]:{...(p[dateRO]||{soldInitial:0,manualEntries:[]}),soldInitial:+v}}))
  const lockSoldInit=()=>{setRcData(p=>({...p,[dateRO]:{...(p[dateRO]||{soldInitial:0,manualEntries:[]}),soldLocked:true}}));setEditSold(false)}
  const addManual=()=>{
    if(!newEntry.explicatie||!newEntry.suma)return
    const e={...newEntry,id:'m'+Date.now(),suma:+newEntry.suma,ts:Date.now()}
    setRcData(p=>({...p,[dateRO]:{...(p[dateRO]||{soldInitial:0,manualEntries:[]}),manualEntries:[...(p[dateRO]?.manualEntries||[]),e]}}))
    setNewEntry({type:'incasare',nr_doc:'',explicatie:'',suma:0});setShowForm(false)
  }
  const delManual=id=>setRcData(p=>({...p,[dateRO]:{...p[dateRO],manualEntries:p[dateRO].manualEntries.filter(e=>e.id!==id)}}))
  const cashOrders=orders.filter(o=>o.date===dateRO&&o.method==='cash').sort((a,b)=>a.ts-b.ts)
  const dayW=withdrawals.filter(w=>w.date===dateRO)
  const autoEntries=[
    ...cashOrders.map(o=>({id:'o'+o.id,type:'incasare',nr_doc:`BF-${o.num}`,explicatie:`Vânzare numerar — ${o.emp_name}`,suma:o.total,ts:o.ts,auto:true})),
    ...dayW.map(w=>({id:'w'+w.id,type:'plata',nr_doc:`RET-${w.id}`,explicatie:`Retragere — ${w.emp_name}: ${w.motiv}`,suma:w.suma,ts:w.ts||Date.now(),auto:true})),
  ]
  const allEntries=[...autoEntries,...(dayData.manualEntries||[])].sort((a,b)=>(a.ts||0)-(b.ts||0))
  const totalInc=allEntries.filter(e=>e.type==='incasare').reduce((s,e)=>s+e.suma,0)
  const totalPla=allEntries.filter(e=>e.type==='plata').reduce((s,e)=>s+e.suma,0)
  const soldFinal=(dayData.soldInitial||0)+totalInc-totalPla
  let running=dayData.soldInitial||0
  const rows=allEntries.map((e,i)=>{if(e.type==='incasare')running+=e.suma;else running-=e.suma;return{...e,sold:running,nr:i+1}})
  const printReg=()=>{
    const w=window.open('','_blank','width=860,height=700')
    w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Registru de Casă — ${dateRO}</title><style>
body{font-family:Arial,sans-serif;font-size:11px;margin:24px;color:#111}
h2{text-align:center;font-size:15px;margin:0 0 2px}
.sub{text-align:center;font-size:11px;color:#555;margin-bottom:18px}
table{width:100%;border-collapse:collapse;margin-bottom:12px}
th{background:#0017C0;color:#fff;padding:7px 8px;text-align:left;font-size:10px;text-transform:uppercase}
td{padding:6px 8px;border-bottom:1px solid #e8e8e8;vertical-align:middle}
.inc{color:#1a7a3c;font-weight:700}
.pla{color:#c0392b;font-weight:700}
.bold{font-weight:700}
.total-row td{font-weight:800;border-top:2px solid #0017C0;background:#f0f4ff;font-size:12px}
.final-row td{background:#0017C0;color:#fff;font-weight:800;font-size:13px;padding:9px 8px}
.manual{background:#fffbf0}
.footer{font-size:9px;color:#999;margin-top:16px;text-align:right}
@media print{.no-print{display:none}}
</style></head><body>
<h2>REGISTRU DE CASĂ</h2>
<div class="sub"><strong>VladimirSmash Fast Food</strong> &nbsp;|&nbsp; Data: <strong>${dateRO}</strong></div>
<table>
<tr><th>#</th><th>Data</th><th>Nr. Document</th><th>Explicații</th><th>Încasări (RON)</th><th>Plăți (RON)</th><th>Sold (RON)</th></tr>
<tr><td colspan="6" class="bold" style="background:#f5f7ff">Sold inițial</td><td class="bold" style="background:#f5f7ff">${(dayData.soldInitial||0).toFixed(2)}</td></tr>
${rows.map(r=>`<tr${!r.auto?' class="manual"':''}><td>${r.nr}</td><td>${dateRO}</td><td>${r.nr_doc||'—'}</td><td>${r.explicatie}${!r.auto?' <em style="color:#b35a00">(manual)</em>':''}</td><td class="inc">${r.type==='incasare'?r.suma.toFixed(2):''}</td><td class="pla">${r.type==='plata'?r.suma.toFixed(2):''}</td><td class="bold">${r.sold.toFixed(2)}</td></tr>`).join('')}
<tr class="total-row"><td colspan="4" style="text-align:right">TOTAL ZIUA ${dateRO}:</td><td class="inc">${totalInc.toFixed(2)}</td><td class="pla">${totalPla.toFixed(2)}</td><td>${soldFinal.toFixed(2)}</td></tr>
<tr class="final-row"><td colspan="6">SOLD FINAL CASĂ — ${dateRO}</td><td>${soldFinal.toFixed(2)} RON</td></tr>
</table>
<p class="footer">Generat automat de VladimirSmash POS &nbsp;|&nbsp; ${new Date().toLocaleString('ro-RO')}</p>
<div class="no-print" style="text-align:center;margin-top:20px"><button onclick="window.print()" style="padding:10px 24px;background:#0017C0;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer">Printează / Salvează PDF</button></div>
</body></html>`)
    w.document.close()
  }
  return <div style={{display:'flex',flexDirection:'column',gap:14}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
      <div style={{fontSize:17,fontWeight:700,color:F.text}}>Registru de Casă</div>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)} style={{padding:'7px 10px',border:`1px solid ${F.border}`,borderRadius:8,fontSize:13,fontFamily:ff}}/>
        <GBtn from='#c0392b' to='#ff3b30' onClick={printReg} style={{padding:'8px 16px',fontSize:13}}>📄 PDF / Print</GBtn>
      </div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
      <StatCard label="Sold inițial" value={fmt(dayData.soldInitial||0)} from='#3a4580' to='#8892cc'/>
      <StatCard label="Încasări cash" value={fmt(totalInc)} from='#1a7a3c' to='#30d158'/>
      <StatCard label="Plăți" value={fmt(totalPla)} from='#c0392b' to='#ff3b30'/>
      <StatCard label="Sold final" value={fmt(soldFinal)} sub={soldFinal>=0?'✓ pozitiv':'⚠ negativ'} from={soldFinal>=0?'#0017C0':'#c0392b'} to={soldFinal>=0?'#0066ff':'#ff3b30'}/>
    </div>
    <Card style={{padding:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:F.text}}>Sold inițial casă — {dateRO}</div>
          <div style={{fontSize:11,color:F.textMuted,marginTop:2}}>Banii fizici existenți în casă la începutul zilei{dayData.soldLocked&&!editSold?' — 🔒 blocat':''}</div>
        </div>
        {dayData.soldLocked&&!editSold
          ?<div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:18,fontWeight:800,color:F.primary}}>{(dayData.soldInitial||0).toFixed(2)} RON</span>
            <button onClick={()=>setEditSold(true)} style={{padding:'6px 12px',borderRadius:8,border:`1px solid ${F.border}`,background:'#f5f5f7',fontFamily:ff,fontSize:12,fontWeight:600,cursor:'pointer'}}>✏️ Modifică</button>
          </div>
          :<div style={{display:'flex',alignItems:'center',gap:8}}>
            <input type="number" value={dayData.soldInitial||0} onChange={e=>setSoldInit(e.target.value)} style={{width:110,padding:'8px 10px',border:`2px solid ${F.primary}`,borderRadius:9,fontSize:15,fontFamily:ff,fontWeight:800,textAlign:'right',color:F.primary}}/>
            <span style={{fontSize:13,fontWeight:700,color:F.textMuted}}>RON</span>
            <button onClick={lockSoldInit} style={{padding:'7px 14px',borderRadius:8,border:'none',background:'linear-gradient(135deg,#1a7a3c,#30d158)',color:'#fff',fontFamily:ff,fontSize:12,fontWeight:700,cursor:'pointer'}}>✓ Salvează</button>
          </div>
        }
      </div>
    </Card>
    <Card>
      <div style={{display:'grid',gridTemplateColumns:'28px 3fr 90px 90px 90px 100px 32px',gap:4,padding:'8px 14px',background:F.bg,borderBottom:`2px solid ${F.border}`}}>
        {['#','Explicații','Nr. Doc','Încasări','Plăți','Sold',''].map(h=><div key={h} style={{fontSize:10,fontWeight:700,color:F.textMuted,textTransform:'uppercase'}}>{h}</div>)}
      </div>
      <div style={{padding:'7px 14px',borderBottom:`1px solid ${F.border}`,display:'grid',gridTemplateColumns:'28px 3fr 90px 90px 90px 100px 32px',gap:4,alignItems:'center',background:'#f5f7ff'}}>
        <span style={{fontSize:11,color:F.textMuted}}>—</span>
        <span style={{fontSize:12,fontWeight:700,color:F.text}}>Sold inițial</span>
        <span/><span/><span/>
        <span style={{fontSize:13,fontWeight:800,color:F.primary}}>{(dayData.soldInitial||0).toFixed(2)} RON</span>
        <span/>
      </div>
      {rows.length===0&&<div style={{padding:28,textAlign:'center',color:F.textMuted,fontSize:13}}>Nicio tranzacție înregistrată pentru {dateRO}</div>}
      {rows.map(r=>(
        <div key={r.id} style={{padding:'8px 14px',borderBottom:`1px solid ${F.border}`,display:'grid',gridTemplateColumns:'28px 3fr 90px 90px 90px 100px 32px',gap:4,alignItems:'center',background:r.auto?'transparent':'#fffbf0'}}>
          <span style={{fontSize:11,color:F.textMuted,fontWeight:600}}>{r.nr}</span>
          <div>
            <div style={{fontSize:12,fontWeight:600,color:F.text}}>{r.explicatie}</div>
            {!r.auto&&<div style={{fontSize:10,color:'#b35a00',fontWeight:600}}>intrare manuală</div>}
          </div>
          <span style={{fontSize:11,color:F.textMuted}}>{r.nr_doc||'—'}</span>
          <span style={{fontSize:12,fontWeight:700,color:'#1a7a3c'}}>{r.type==='incasare'?r.suma.toFixed(2)+' RON':''}</span>
          <span style={{fontSize:12,fontWeight:700,color:'#c0392b'}}>{r.type==='plata'?r.suma.toFixed(2)+' RON':''}</span>
          <span style={{fontSize:12,fontWeight:800,color:F.primary}}>{r.sold.toFixed(2)} RON</span>
          {!r.auto?<button onClick={()=>delManual(r.id)} style={{background:'#fff2f1',border:'none',color:'#c0392b',borderRadius:5,padding:'3px 7px',cursor:'pointer',fontSize:13,fontFamily:ff}}>×</button>:<span/>}
        </div>
      ))}
      <div style={{padding:'10px 14px',display:'grid',gridTemplateColumns:'28px 3fr 90px 90px 90px 100px 32px',gap:4,alignItems:'center',background:'#f0f4ff',borderTop:`2px solid ${F.primary}`}}>
        <span/><span style={{fontSize:13,fontWeight:800,color:F.text}}>TOTAL</span><span/>
        <span style={{fontSize:13,fontWeight:800,color:'#1a7a3c'}}>{totalInc.toFixed(2)} RON</span>
        <span style={{fontSize:13,fontWeight:800,color:'#c0392b'}}>{totalPla.toFixed(2)} RON</span>
        <span style={{fontSize:14,fontWeight:800,color:F.primary}}>{soldFinal.toFixed(2)} RON</span>
        <span/>
      </div>
    </Card>
    {!showForm
      ?<GBtn from='#0017C0' to='#0066ff' onClick={()=>setShowForm(true)} style={{padding:'11px 0',fontSize:13,width:'100%'}}>+ Adaugă înregistrare manuală</GBtn>
      :<Card style={{padding:16}}>
        <div style={{fontSize:14,fontWeight:700,color:F.text,marginBottom:12}}>Înregistrare manuală</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
          <div style={{display:'flex',flexDirection:'column',gap:4}}>
            <label style={{fontSize:11,fontWeight:600,color:F.textSec}}>Tip</label>
            <select value={newEntry.type} onChange={e=>setNewEntry(p=>({...p,type:e.target.value}))} style={{padding:'7px 10px',border:`1px solid ${F.border}`,borderRadius:8,fontSize:13,fontFamily:ff}}>
              <option value="incasare">Încasare</option>
              <option value="plata">Plată</option>
            </select>
          </div>
          <Inp label="Nr. Document" value={newEntry.nr_doc} onChange={v=>setNewEntry(p=>({...p,nr_doc:v}))} placeholder="ex: CH-001, FA-123"/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:10,marginBottom:12}}>
          <Inp label="Explicații *" value={newEntry.explicatie} onChange={v=>setNewEntry(p=>({...p,explicatie:v}))} placeholder="ex: Plată furnizor pâine, Chirie..."/>
          <Inp label="Sumă (RON) *" value={newEntry.suma} onChange={v=>setNewEntry(p=>({...p,suma:+v}))} type="number"/>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>setShowForm(false)} style={{flex:1,padding:'10px',borderRadius:10,border:`1px solid ${F.border}`,background:'#f5f5f7',fontFamily:ff,fontSize:13,fontWeight:600,cursor:'pointer'}}>Anulează</button>
          <GBtn from='#0017C0' to='#0066ff' onClick={addManual} style={{flex:2,padding:'10px',fontSize:13}}>Salvează înregistrarea</GBtn>
        </div>
      </Card>
    }
    {Object.keys(rcData).length>0&&<Card style={{padding:14}}>
      <div style={{fontSize:13,fontWeight:700,color:F.text,marginBottom:10}}>📅 Istoric zile</div>
      <div style={{display:'flex',flexDirection:'column',gap:3,maxHeight:220,overflowY:'auto'}}>
        {Object.entries(rcData).sort((a,b)=>{
          const pa=a[0].split('.'),pb=b[0].split('.')
          const da=new Date(+pa[2],+pa[1]-1,+pa[0]),db=new Date(+pb[2],+pb[1]-1,+pb[0])
          return db-da
        }).map(([d,dData])=>{
          const cashOs=orders.filter(o=>o.date===d&&o.method==='cash')
          const manI=(dData.manualEntries||[]).filter(e=>e.type==='incasare').reduce((s,e)=>s+e.suma,0)
          const manP=(dData.manualEntries||[]).filter(e=>e.type==='plata').reduce((s,e)=>s+e.suma,0)
          const totalI=cashOs.reduce((s,o)=>s+o.total,0)+manI
          const totalP=withdrawals.filter(w=>w.date===d).reduce((s,w)=>s+w.suma,0)+manP
          const soldF=(dData.soldInitial||0)+totalI-totalP
          const isSel=d===dateRO
          const parts=d.split('.')
          const iso=parts.length===3?`${parts[2]}-${parts[1]}-${parts[0]}`:d
          return <div key={d} onClick={()=>setSelDate(iso)} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 10px',borderRadius:8,background:isSel?'#f0f4ff':'transparent',cursor:'pointer',border:isSel?`1px solid ${F.border}`:'1px solid transparent'}}>
            <span style={{fontSize:12,fontWeight:700,color:F.text,minWidth:72}}>{d}</span>
            <span style={{fontSize:11,color:'#1a7a3c',flex:1}}>+{totalI.toFixed(2)}</span>
            {totalP>0&&<span style={{fontSize:11,color:'#c0392b'}}>-{totalP.toFixed(2)}</span>}
            <span style={{fontSize:12,fontWeight:800,color:F.primary}}>{soldF.toFixed(2)} RON</span>
            {dData.soldLocked&&<span style={{fontSize:11}}>🔒</span>}
          </div>
        })}
      </div>
    </Card>}
    <div style={{background:'#e8fff2',border:'1px solid #a8f0c8',borderRadius:10,padding:'10px 14px',fontSize:11,color:'#1a7a3c',fontWeight:600}}>
      ✓ Registrul se completează automat cu vânzările cash și retragerile zilei. Adaugă manual alte plăți/încasări (furnizori, chirie, diverse). Apasă PDF/Print pentru a trimite la contabilitate.
    </div>
  </div>
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function AppInner(){
  const [screen,setScreen]=useState('login')
  const [employee,setEmployee]=useState(null)
  const [cats,setCats]=usePersist('pos_cats',INIT_CATS)
  const [products,setProducts]=usePersist('pos_products',INIT_PRODS)
  const [stock,setStock]=usePersist('pos_stock',INIT_STOCK)
  const [employees,setEmployees]=usePersist('pos_employees',INIT_EMP)
  const [orders,setOrders]=usePersist('pos_orders',()=>genHistory(INIT_EMP,INIT_PRODS))
  const [protocols,setProtocols]=usePersist('pos_protocols',[])
  const [customers,setCustomers]=usePersist('pos_customers',[])
  const [menus,setMenus]=usePersist('pos_menus',[])
  const [withdrawals,setWithdrawals]=usePersist('pos_withdrawals',[])
  const [pierderi,setPierderi]=usePersist('pos_pierderi',[])
  const [btnCfg,setBtnCfg]=usePersist('pos_btnCfg',{kitchen:['#0017C0','#0066ff'],cash:['#1a7a1a','#28cd41'],card:['#cc0000','#ff0000'],protocol:['#6e1a8b','#bf5af2']})
  if(screen==='login') return <LoginScreen employees={employees} onLogin={e=>{setEmployee(e);setScreen('pos')}}/>
  if(screen==='pos')   return <POSView employee={employee} products={products} setProducts={setProducts} cats={cats} setCats={setCats} stock={stock} setStock={setStock} orders={orders} setOrders={setOrders} protocols={protocols} setProtocols={setProtocols} customers={customers} setCustomers={setCustomers} menus={menus} pierderi={pierderi} setPierderi={setPierderi} onAdmin={()=>setScreen('admin')} onLogout={()=>{setEmployee(null);setScreen('login')}} btnCfg={btnCfg} setBtnCfg={setBtnCfg}/>
  if(screen==='admin') return <AdminView employee={employee} employees={employees} setEmployees={setEmployees} products={products} setProducts={setProducts} cats={cats} setCats={setCats} stock={stock} setStock={setStock} orders={orders} setOrders={setOrders} protocols={protocols} menus={menus} setMenus={setMenus} withdrawals={withdrawals} setWithdrawals={setWithdrawals} pierderi={pierderi} setPierderi={setPierderi} btnCfg={btnCfg} setBtnCfg={setBtnCfg} onPOS={()=>setScreen('pos')}/>
}

// ── APP WRAPPER (Supabase loader) ────────────────────────────────────────────
function App(){
  const [ready,setReady]=useState(false)
  useEffect(()=>{
    if(!sb){setReady(true);return}
    Promise.resolve(sb.from('pos_store').select('store_key,value').eq('restaurant_id',RESTAURANT_ID))
      .then(({data})=>{
        if(data&&data.length>0) data.forEach(({store_key,value})=>{try{
          // value din Supabase JSONB poate fi string sau object — nu re-serializăm string-urile
          const toStore = typeof value === 'string' ? value : JSON.stringify(value);
          localStorage.setItem(store_key, toStore);
        }catch{}})
      })
      .catch(()=>{})
      .finally(()=>setReady(true))
  },[])
  if(!ready) return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f0f4ff',fontFamily:'-apple-system,BlinkMacSystemFont,sans-serif'}}>
    <div style={{textAlign:'center'}}>
      <div style={{width:60,height:60,borderRadius:16,background:'linear-gradient(135deg,#0017C0,#0066ff)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:30,fontWeight:800,color:'#fff',margin:'0 auto 16px'}}>V</div>
      <div style={{fontSize:18,fontWeight:800,color:'#0a0f2e'}}>VladimirSmash POS</div>
      <div style={{fontSize:13,color:'#8892cc',marginTop:8}}>Conectare la server...</div>
      <div style={{marginTop:16,width:40,height:4,borderRadius:2,background:'#e2e8ff',margin:'16px auto 0',overflow:'hidden'}}>
        <div style={{width:'60%',height:'100%',background:'linear-gradient(90deg,#0017C0,#0066ff)',borderRadius:2,animation:'slide 1s infinite'}}/>
      </div>
    </div>
  </div>
  return <AppInner/>
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script></body></html>
