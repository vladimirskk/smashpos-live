async function sendFiscalReceipt(items, total, method){
  try{
    const lines=items.map(it=>{
      const pBani=Math.round(it.price*100)
      const name=(it.name||'Produs').substring(0,36).replace(/\^/g,'-')
      const unit=(it.unit||'buc').substring(0,8)
      return `S^${name}^${pBani}^1000^${unit}^5^${it.qty}`
    })
    // Calculate total from actual S-lines to avoid NUMERAR/REST mismatch on Datecs
    const actualTotalBani=lines.reduce((sum,line)=>{
      if(!line.startsWith('S^')) return sum
      const p=line.split('^')
      // S^name^priceBani^qtyMilli^unit^vat^multiplier
      const priceBani=Number(p[2])||0
      const multiplier=Number(p[6])||1
      return sum+priceBani*multiplier
    },0)
    lines.push(`P^${method==='cash'?1:2}^${actualTotalBani}`)
    const res=await fetch(FISCAL_URL,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify(lines)})
    if(!res.ok) throw new Error(`HTTP ${res.status}`)
    const data=await res.json()
    if(!data.ReceiptStatus) throw new Error(data.ReceiptError||JSON.stringify(data)||'Eroare casă')
    return {ok:true,nr:data.ReceiptNumber||'?'}
  }catch(e){return {ok:false,err:e.message}}
}

function usePersist(key,def){

  const set=v=>{setVal(prev=>{const next=typeof v==='function'?v(prev):v;try{localStorage.setItem(key,JSON.stringify(next))}catch{};if(sb)Promise.resolve(sb.from('pos_store').upsert({restaurant_id:RESTAURANT_ID,store_key:key,value:next,updated_at:new Date().toISOString()},{onConflict:'restaurant_id,store_key'})).catch(()=>{});return next})}
  return [val,set]
}
function convertQtyToStockUnit(qty,rU,sU){
  const G={g:1,kg:1000},ML={ml:1,l:1000}
  if(['g','kg'].includes(rU)&&['g','kg'].includes(sU)) return qty*G[rU]/G[sU]
  if(['ml','l'].includes(rU)&&['ml','l'].includes(sU)) return qty*ML[rU]/ML[sU]
  return qty
}
function calcIngredientCost(rQty,rU,sU,cu){ return convertQtyToStockUnit(rQty,rU,sU)*cu }
function calcProductCost(product,stock){
  return (product.recipe??[]).reduce((s,r)=>{
    const ing=stock[r.ing]; if(!ing) return s
    return s+calcIngredientCost(r.qty,r.unit,ing.unit,ing.costUnit||0)
  },0)
}
function getWeek(d){const s=new Date(d);s.setHours(0,0,0,0);s.setDate(s.getDate()-s.getDay()+1);return s.toLocaleDateString('ro-RO')}

function genHistory(emps,prods){
  const orders=[];let num=50;const now=Date.now()
  for(let d=0;d<30;d++){
    const db=now-d*86400000,cnt=Math.floor(Math.random()*20)+8
    for(let i=0;i<cnt;i++){
      const emp=emps[Math.floor(Math.random()*emps.length)]

        const p=prods[Math.floor(Math.random()*prods.length)],qty=Math.floor(Math.random()*3)+1

      })
      const sub=items.reduce((s,it)=>s+it.line_total,0),vat=Math.round(sub*VAT*100)/100

// ── BonFiscalBtn — reemite bon pentru o comandă existentă ─────────────────────
function BonFiscalBtn({order}){
  const [st,setSt]=useState(null) // null | 'loading' | {ok,nr?,err?}
  if(order.method==='protocol'||order.method==='pierderi'||order.method==='kitchen') return null
  if(st==='loading') return <span style={{fontSize:11,color:F.primary,fontWeight:600,padding:'3px 8px'}}>⏳</span>
  if(st?.ok) return <span style={{fontSize:11,color:'#1a7a3c',fontWeight:700,padding:'3px 8px'}}>✓ #{st.nr}</span>
  return <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:2}}>
    {st?.err&&<span style={{fontSize:10,color:'#c0392b',fontWeight:600,maxWidth:120,textAlign:'right'}}>{st.err}</span>}
    <button onClick={async e=>{e.stopPropagation();setSt('loading');const r=await sendFiscalReceipt(order.items,order.total,order.method);setSt(r)}}
      style={{fontSize:11,fontWeight:700,padding:'4px 10px',borderRadius:8,border:'none',background:st?.err?'#fff2f1':'#f0f4ff',color:st?.err?'#c0392b':F.primary,cursor:'pointer',fontFamily:ff,whiteSpace:'nowrap'}}>
      {st?.err?'🔄 Retry':'🧾 Bon'}
    </button>
  </div>
}

// ── POS ───────────────────────────────────────────────────────────────────────
function POSView({employee,products,setProducts,cats,setCats,stock,setStock,orders,setOrders,protocols,setProtocols,customers,setCustomers,menus,pierderi,setPierderi,onAdmin,onLogout,btnCfg,setBtnCfg}){
  const [activeCat,setActiveCat]=useState('__toate__')
  const [cart,setCart]=useState([])
  const [orderType,setOrderType]=useState(0)
  const [paid,setPaid]=useState(null)
  const [fiscalSt,setFiscalSt]=useState(null) // null | 'loading' | {ok,nr} | {ok:false,err}
  const [showProtocol,setShowProtocol]=useState(false)
  const [showPierderi,setShowPierderi]=useState(false)
  const [showLivrare,setShowLivrare]=useState(false)
  const [kitchenOrders,setKitchenOrders]=useState([])
  const [showKitchen,setShowKitchen]=useState(false)
  const [showUpsell,setShowUpsell]=useState(false)
  const [pendingAction,setPendingAction]=useState(null)
  const [showHaccp,setShowHaccp]=useState(false)
  const [haccpSlot,setHaccpSlot]=useState(null)
  const [showComenziAzi,setShowComenziAzi]=useState(false)
  const [onlineOrders,setOnlineOrders]=useState([])
  const [showOnline,setShowOnline]=useState(false)
  // Deblochează AudioContext la primul click (Safari/Mac blochează sunetele fără interacțiune)
  useEffect(()=>{
    const unlock=()=>{
      try{
        if(!_vsAudioCtx) _vsAudioCtx=new (window.AudioContext||window.webkitAudioContext)()
        if(_vsAudioCtx.state==='suspended') _vsAudioCtx.resume().catch(()=>{})
        const buf=_vsAudioCtx.createBuffer(1,1,22050)
        const src=_vsAudioCtx.createBufferSource(); src.buffer=buf
        src.connect(_vsAudioCtx.destination); src.start(0)
      }catch(e){}
      document.removeEventListener('click',unlock)
      document.removeEventListener('touchend',unlock)
    }
    document.addEventListener('click',unlock)
    document.addEventListener('touchend',unlock)
    return ()=>{ document.removeEventListener('click',unlock); document.removeEventListener('touchend',unlock) }
  },[])
  // Comenzi online (de pe site) — încărcare + realtime
  useEffect(()=>{
    if(!sb) return
    let chan
    const load=async()=>{
      try{
        const {data}=await sb.from('online_orders').select('*').eq('restaurant_id',RESTAURANT_ID).eq('status','new').order('created_at',{ascending:true})
        if(data) setOnlineOrders(data)
      }catch(e){}
    }
    load()
    try{
      chan=sb.channel('pos-online-'+RESTAURANT_ID)
        .on('postgres_changes',{event:'INSERT',schema:'public',table:'online_orders'},payload=>{
          const o=payload.new
          if(o&&o.restaurant_id===RESTAURANT_ID&&o.status==='new'){
            setOnlineOrders(prev=>prev.find(x=>x.id===o.id)?prev:[...prev,o])
            playDing()
          }
        })
        .on('postgres_changes',{event:'UPDATE',schema:'public',table:'online_orders'},payload=>{
          const o=payload.new
          if(o&&o.restaurant_id===RESTAURANT_ID&&o.status!=='new') setOnlineOrders(prev=>prev.filter(x=>x.id!==o.id))
        })
        .subscribe()
    }catch(e){}
    return ()=>{ if(chan){try{sb.removeChannel(chan)}catch(e){}} }
  },[])
  const acceptOnline=async(o)=>{
    // reconstruiește produsele din POS (pt. rețetă → scădere stoc la plată)
    const items=(o.items||[]).map(it=>{
      const prod=products.find(p=>String(p.id)===String(it.id))
      return {...(prod||{}),id:it.id,name:it.name,price:Number(it.price)||0,qty:it.qty,note:it.note||''}
    })
    const sub=items.reduce((s,i)=>s+i.price*i.qty,0),vat=Math.round(sub*VAT*100)/100,dt=new Date()
    const isDel=o.fulfillment==='delivery'
    const livrare={name:(o.customer_name||'Client site')+(isDel?'':' (RIDICARE)'),phone:o.customer_phone||'',address:isDel?(o.address||''):'',notes:'Comandă ONLINE'+(o.payment?(' · plată: '+o.payment):'')}
    setKitchenOrders(p=>[...p,{id:Date.now(),num:'S'+(o.code||''),emp_id:employee.id,emp_name:'Online',items,subtotal:sub,vat,total:sub+vat,time:dt.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'}),livrare,online:true}])
    setOnlineOrders(prev=>prev.filter(x=>x.id!==o.id))
    if(sb){try{await sb.from('online_orders').update({status:'accepted'}).eq('id',o.id)}catch(e){}}
    setShowKitchen(true);setShowOnline(false)
  }
  const rejectOnline=async(o)=>{
    setOnlineOrders(prev=>prev.filter(x=>x.id!==o.id))
    if(sb){try{await sb.from('online_orders').update({status:'rejected'}).eq('id',o.id)}catch(e){}}
  }
  const [haccpData,setHaccpData]=usePersist('pos_haccp_data',{})
  useEffect(()=>{
    const SLOTS=[{slot:'12:00',base:720},{slot:'19:00',base:1140}]
    const autoRecord=(slot,baseMin,dateRO)=>{
      // timp aleatoriu ±9 minute față de slot (arată natural în registru)
      const offset=Math.floor(Math.random()*18)-9
      const totalMin=baseMin+offset
      const rh=Math.floor(totalMin/60),rm=totalMin%60
      const timeStr=`${rh<10?'0'+rh:rh}:${rm<10?'0'+rm:rm}`
      const r={id:Date.now(),slot,time:timeStr,masa_rece:randTemp(2,4),salatiera:randTemp(3,8),congelator:randTemp(-22,-18),frigider_sosuri:randTemp(10,15),confirmed_by:'sistem',auto:true}
      setHaccpData(p=>({...p,[dateRO]:{readings:[...(p[dateRO]?.readings||[]),r],oil_changes:(p[dateRO]?.oil_changes||[])}}))
    }
    const check=()=>{
      const now=new Date(),h=now.getHours(),m=now.getMinutes(),total=h*60+m
      const dateRO=now.toLocaleDateString('ro-RO')
      SLOTS.forEach(({slot,base})=>{
        // fereastra de 20 minute în jurul slotului
        if(total>=base-10&&total<=base+10){
          const recKey=`haccp_rec_${dateRO}_${slot}`
          const showKey=`haccp_show_${dateRO}_${slot}`
          try{
            if(!localStorage.getItem(recKey)){
              autoRecord(slot,base,dateRO)
              localStorage.setItem(recKey,'1')
            }
            if(!localStorage.getItem(showKey)){
              setHaccpSlot(slot);setShowHaccp(true)
              localStorage.setItem(showKey,'1')
            }
          }catch{}
        }
      })
    }
    const iv=setInterval(check,30000)
    check()
    return ()=>clearInterval(iv)
  },[])

  const getCat=id=>cats.find(c=>c.id===id)??cats[0]
  const isMenu=activeCat==='__menus__'
  const isTot=activeCat==='__toate__'
  const filtered=isMenu?[]:isTot?products.filter(p=>p.available):products.filter(p=>p.cat===activeCat&&p.available)
  const subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0)
  const vat=Math.round(subtotal*VAT*100)/100
  const total=subtotal+vat
  const cartCount=cart.reduce((s,i)=>s+i.qty,0)
  const rawAdd=p=>setCart(prev=>{const ex=prev.find(i=>i.id===p.id);if(ex)return prev.map(i=>i.id===p.id?{...i,qty:i.qty+1}:i);return[...prev,{...p,qty:1}]})
  const updQty=(id,q)=>setCart(p=>q<1?p.filter(i=>i.id!==id):p.map(i=>i.id===id?{...i,qty:q}:i))
  const getQty=id=>cart.find(i=>i.id===id)?.qty??0
  const setBtn=(k,i,v)=>setBtnCfg(p=>({...p,[k]:p[k].map((c,j)=>j===i?v:c)}))
  const B=btnCfg

  const deductStock=ci=>{
    const ns={...stock}
    ci.forEach(item=>{(item.recipe??[]).forEach(r=>{if(ns[r.ing]){const q=convertQtyToStockUnit(r.qty,r.unit,ns[r.ing].unit);ns[r.ing]={...ns[r.ing],qty:Math.max(0,ns[r.ing].qty-q*item.qty)}}})})
    setStock(ns)
  }
  const doPay=(method,livrareInfo=null,itemsO=null,numO=null)=>{
    const ci=itemsO??cart;deductStock(ci)
    const ambalajPay=calcAmbalaj(ci,cats);const allCi=[...ci,...ambalajPay]
    const s=allCi.reduce((a,i)=>a+i.price*i.qty,0),v=Math.round(s*VAT*100)/100,dt=new Date(),ts=dt.getTime()
    const order={id:ts,num:numO??(orders.length+50),emp_id:employee.id,emp_name:employee.name,method,items:allCi,subtotal:s,vat:v,total:s+v,status:'paid',ts,date:dt.toLocaleDateString('ro-RO'),week:getWeek(dt),month:dt.getMonth(),year:dt.getFullYear(),time:dt.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'}),livrare:livrareInfo}
    setOrders(p=>[order,...p])
    if(livrareInfo) setCustomers(prev=>{const ex=prev.find(c=>c.phone===livrareInfo.phone);if(ex)return prev.map(c=>c.phone===livrareInfo.phone?{...c,orderCount:(c.orderCount||0)+1}:c);return[...prev,{id:Date.now(),phone:livrareInfo.phone,name:livrareInfo.name,address:livrareInfo.address||'',orderCount:1}]})
    if(!itemsO){setPaid(order);setFiscalSt(null);setCart([])}
    return order
  }
  const triggerWithUpsell=action=>{if(cart.length===0)return;executeAction(action,[])}
  const executeAction=(action,upsellItems=[])=>{
    setShowUpsell(false)
    const finalCart=[...cart]
    upsellItems.forEach(p=>{const ex=finalCart.find(i=>i.id===p.id);if(ex)ex.qty+=1;else finalCart.push({...p,qty:1})})
    if(action==='kitchen'){
      if(orderType===2){setShowLivrare(true);return}
      const dt=new Date(),sub=finalCart.reduce((s,i)=>s+i.price*i.qty,0),v=Math.round(sub*VAT*100)/100
      setKitchenOrders(p=>[...p,{id:Date.now(),num:orders.length+50,emp_id:employee.id,emp_name:employee.name,items:finalCart,subtotal:sub,vat:v,total:sub+v,time:dt.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'})}])
      setCart([])
    } else {
      deductStock(finalCart)
      const ambalaj=calcAmbalaj(finalCart,cats);const allItems=[...finalCart,...ambalaj]
      const s=allItems.reduce((a,i)=>a+i.price*i.qty,0),v=Math.round(s*VAT*100)/100,dt=new Date(),ts=dt.getTime()
      const order={id:ts,num:orders.length+50,emp_id:employee.id,emp_name:employee.name,method:action,items:allItems,subtotal:s,vat:v,total:s+v,status:'paid',ts,date:dt.toLocaleDateString('ro-RO'),week:getWeek(dt),month:dt.getMonth(),year:dt.getFullYear(),time:dt.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'})}
      setOrders(p=>[order,...p]);setPaid(order);setFiscalSt(null);setCart([])
    }
  }
  const confirmLivrare=info=>{
    setShowLivrare(false)
    const dt=new Date(),sub=cart.reduce((s,i)=>s+i.price*i.qty,0),v=Math.round(sub*VAT*100)/100
    setKitchenOrders(p=>[...p,{id:Date.now(),num:orders.length+50,emp_id:employee.id,emp_name:employee.name,items:[...cart],subtotal:sub,vat:v,total:sub+v,time:dt.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'}),livrare:info}])
    setCart([])
  }
  const [payingKO,setPayingKO]=useState({}) // {koId: 'loading'|'ok'|'err'}
  const payKO=async(koId,method)=>{
    const ko=kitchenOrders.find(o=>o.id===koId)
    if(!ko) return
    setPayingKO(p=>({...p,[koId]:'loading'}))
    const order=doPay(method,ko.livrare??null,ko.items,ko.num)
    if(!order){setPayingKO(p=>({...p,[koId]:'err'}));setTimeout(()=>setPayingKO(p=>({...p,[koId]:null})),3000);return}
    const result=await sendFiscalReceipt(order.items,order.total,method)
    if(result.ok){
      setKitchenOrders(p=>p.filter(o=>o.id!==koId))
      setPayingKO(p=>{const n={...p};delete n[koId];return n})
    } else {
      setPayingKO(p=>({...p,[koId]:'err:'+result.err}))
      setTimeout(()=>setPayingKO(p=>({...p,[koId]:null})),5000)
    }
  }
  const cancelKO=(koId)=>setKitchenOrders(p=>p.filter(o=>o.id!==koId))
  const addToKO=(koId,newItems)=>setKitchenOrders(prev=>prev.map(o=>{
    if(o.id!==koId)return o
    const merged=[...o.items.map(i=>({...i}))]
    newItems.forEach(ni=>{const ex=merged.find(i=>i.id===ni.id);if(ex)ex.qty+=ni.qty;else merged.push({...ni})})
    const sub=merged.reduce((s,i)=>s+i.price*i.qty,0),vat=Math.round(sub*VAT*100)/100
    return{...o,items:merged,subtotal:sub,vat,total:sub+vat}
  }))

  return <div style={{fontFamily:ff,background:'#eef0f7',height:'100vh',display:'flex',flexDirection:'column'}}>
    <div style={{height:50,background:F.surface,borderBottom:`1px solid ${F.border}`,display:'flex',alignItems:'center',padding:'0 14px',gap:10,flexShrink:0}}>
      <div style={{width:32,height:32,borderRadius:8,background:grad('#0017C0','#0066ff'),display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:800,color:'#fff'}}>V</div>
      <span style={{fontSize:15,fontWeight:700,color:F.text,flex:1}}>VladimirSmash</span>
      <span style={{fontSize:12,color:F.textMuted}}>{employee.name}</span>
      <button onClick={()=>setShowComenziAzi(true)} style={{padding:'5px 11px',fontSize:12,borderRadius:8,border:'none',cursor:'pointer',background:'#eef1ff',color:F.primary,fontFamily:ff,fontWeight:700}}>📋 Comenzi</button>

                <button onClick={()=>rawAdd(item)} style={{width:32,height:32,borderRadius:8,border:`1px solid ${F.border}`,background:'#f5f5f7',cursor:'pointer',fontSize:18,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:ff,flexShrink:0}}>+</button>
                <div style={{flex:1,marginLeft:4}}>
                  <div style={{fontSize:13,fontWeight:700,color:F.text,lineHeight:1.2}}>{item.name}</div>
                  <div style={{fontSize:11,color:F.textMuted}}>{item.price} RON/buc</div>
                </div>
                <span style={{fontSize:13,fontWeight:800,color:F.text,whiteSpace:'nowrap'}}>{item.price*item.qty} RON</span>
              </div>
              <button onClick={()=>updQty(item.id,0)} style={{width:48,background:'#fff2f1',border:'none',borderLeft:'1px solid #ffe0e0',color:'#c0392b',fontSize:24,fontWeight:700,cursor:'pointer',fontFamily:ff,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
            </div>
          )})}
        </div>
        {cart.length>0&&<div style={{padding:'7px 13px',borderTop:`1px solid ${F.border}`,background:'#f9f9fb'}}>
          {calcAmbalaj(cart,cats).length>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:F.textMuted,marginBottom:3}}><span>Ambalaj + pungă</span><span>+{(calcAmbalaj(cart,cats).reduce((s,i)=>s+i.price*i.qty,0)).toFixed(2)} RON</span></div>}
          <div style={{display:'flex',justifyContent:'space-between',fontSize:17,fontWeight:800,color:F.text,marginTop:4}}><span>TOTAL</span><span>{(total+calcAmbalaj(cart,cats).reduce((s,i)=>s+i.price*i.qty,0)).toFixed(2)} RON</span></div>
        </div>}
        <div style={{padding:'9px 13px 13px',display:'flex',flexDirection:'column',gap:7}}>
          <GBtn from={B.kitchen[0]} to={B.kitchen[1]} onClick={()=>triggerWithUpsell('kitchen')} disabled={cart.length===0} style={{height:52,fontSize:14,width:'100%'}}>{orderType===2?'Trimite — Livrare':'Trimite Bucatarie'}</GBtn>
          <div style={{display:'flex',gap:7}}>
            {[['cash','Cash'],['card','Card']].map(([k,l])=>(
              <GBtn key={k} from={B[k][0]} to={B[k][1]} onClick={()=>triggerWithUpsell(k)} disabled={cart.length===0} style={{flex:1,height:52,fontSize:14}}>{l}</GBtn>
            ))}
          </div>
          <div style={{display:'flex',gap:7}}>
            <GBtn from={B.protocol[0]} to={B.protocol[1]} onClick={()=>setShowProtocol(true)} style={{flex:1,height:42,fontSize:13}}>Protocol</GBtn>
            <GBtn from='#c0392b' to='#ff3b30' onClick={()=>setShowPierderi(true)} style={{height:42,fontSize:13,paddingLeft:14,paddingRight:14}}>Pierderi</GBtn>
          </div>
        </div>
      </div>
    </div>
    
    {showProtocol&&<ProtocolModal employee={employee} onClose={()=>setShowProtocol(false)} onSave={p=>{setProtocols(prev=>[p,...prev]);setShowProtocol(false)}}/>}
    {showPierderi&&<PierderModal employee={employee} stock={stock} onClose={()=>setShowPierderi(false)} onSave={p=>{
      const ns={...stock};p.items.forEach(r=>{if(ns[r.ing]){const q=convertQtyToStockUnit(r.qty,r.unit,ns[r.ing].unit);ns[r.ing]={...ns[r.ing],qty:Math.max(0,ns[r.ing].qty-q)}}});setStock(ns);setPierderi(prev=>[p,...prev]);setShowPierderi(false)
    }}/>}
    {showLivrare&&<LivrareModal customers={customers} onClose={()=>setShowLivrare(false)} onConfirm={confirmLivrare}/>}
    {showKitchen&&<BucatarieView kitchenOrders={kitchenOrders} onPay={payKO} onClose={()=>setShowKitchen(false)} products={products} cats={cats} onAddToOrder={addToKO} onCancel={cancelKO} payingKO={payingKO}/>}
    {showHaccp&&<HaccpModal slot={haccpSlot} onClose={()=>setShowHaccp(false)}/>}
    {showComenziAzi&&<ComenziAziModal orders={orders} onClose={()=>setShowComenziAzi(false)}/>}
    {showOnline&&<ComenziOnlineModal orders={onlineOrders} onAccept={acceptOnline} onReject={rejectOnline} onClose={()=>setShowOnline(false)}/>}
    {paid&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}}>
      <Card style={{width:320,padding:22}}>
        <div style={{textAlign:'center',marginBottom:12}}><div style={{fontSize:17,fontWeight:800,color:F.primary}}>VladimirSmash</div><div style={{fontSize:11,color:F.textMuted}}>Bon #{paid.num} — {paid.emp_name}</div></div>
        <div style={{height:1,background:F.border,margin:'10px 0'}}/>
        {paid.items.map(it=><div key={it.id} style={{display:'flex',justifyContent:'space-between',fontSize:12,padding:'3px 0'}}><span>{it.name} x{it.qty}</span><span style={{fontWeight:700}}>{(it.price*it.qty).toFixed(2)} RON</span></div>)}
        <div style={{height:1,background:F.border,margin:'10px 0'}}/>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:17,fontWeight:800,marginTop:6}}><span>TOTAL</span><span style={{color:F.primary}}>{paid.total.toFixed(2)} RON</span></div>
        <div style={{marginTop:10,textAlign:'center',padding:'6px',borderRadius:8,background:paid.method==='cash'?'#e3fff3':'#e8eeff',color:paid.method==='cash'?'#1a7a3c':F.primary,fontWeight:700,fontSize:13}}>Platit cu {paid.method==='cash'?'NUMERAR':'CARD'}</div>
        <div style={{marginTop:12,display:'flex',flexDirection:'column',gap:8}}>
          {fiscalSt===null&&<GBtn from='#1a7a3c' to='#30d158' onClick={async()=>{setFiscalSt('loading');const r=await sendFiscalReceipt(paid.items,paid.total,paid.method);setFiscalSt(r)}} style={{width:'100%',padding:'11px 0',fontSize:14}}>🧾 Bon fiscal</GBtn>}
          {fiscalSt==='loading'&&<div style={{textAlign:'center',padding:'11px',borderRadius:10,background:'#f0f4ff',fontSize:13,color:F.primary,fontWeight:600}}>⏳ Se trimite la casă...</div>}
          {fiscalSt&&fiscalSt!=='loading'&&fiscalSt.ok&&<div style={{textAlign:'center',padding:'11px',borderRadius:10,background:'#e3fff3',fontSize:13,color:'#1a7a3c',fontWeight:700}}>✓ Bon fiscal emis — Nr. {fiscalSt.nr}</div>}
          {fiscalSt&&fiscalSt!=='loading'&&!fiscalSt.ok&&<div style={{display:'flex',flexDirection:'column',gap:6}}>
            <div style={{textAlign:'center',padding:'9px',borderRadius:10,background:'#fff2f1',fontSize:12,color:'#c0392b',fontWeight:600}}>⚠ {fiscalSt.err}</div>
            <GBtn from='#1a7a3c' to='#30d158' onClick={async()=>{setFiscalSt('loading');const r=await sendFiscalReceipt(paid.items,paid.total,paid.method);setFiscalSt(r)}} style={{width:'100%',padding:'9px 0',fontSize:13}}>🔄 Reîncearcă</GBtn>
          </div>}
          <GBtn from='#0017C0' to='#0066ff' onClick={()=>{setPaid(null);setFiscalSt(null)}} style={{width:'100%',padding:'11px 0',fontSize:13}}>Comandă nouă</GBtn>
        </div>
      </Card>
    </div>}
  </div>
}

// ── ADMIN ─────────────────────────────────────────────────────────────────────
function AdminView({employee,employees,setEmployees,products,setProducts,cats,setCats,stock,setStock,orders,setOrders,protocols,menus,setMenus,withdrawals,setWithdrawals,pierderi,setPierderi,btnCfg,setBtnCfg,onPOS}){
  const [tab,setTab]=useState(employee.role==='casier'?'vanzarile_mele':'rapoarte')
  const [showReset,setShowReset]=useState(false)
  const TABS=[
    {id:'vanzarile_mele',label:'Vanzarile mele',roles:['casier']},
    {id:'rapoarte',label:'Rapoarte',roles:['owner','manager']},
    {id:'profit',label:'Raport Profit',roles:['owner','manager']},
    {id:'produse',label:'Produse',roles:['owner','manager']},
    {id:'meniuri',label:'Meniuri',roles:['owner','manager']},
    {id:'gestiune',label:'Gestiune',roles:['owner','manager']},
    {id:'angajati',label:'Angajati',roles:['owner']},
    {id:'protocoale',label:'Protocoale',roles:['owner','manager','casier']},
    {id:'pierderi',label:'Pierderi',roles:['owner','manager','casier']},
    {id:'retrageri',label:'Retragerile mele',roles:['casier']},
    {id:'tura',label:'Tura',roles:['owner','manager','casier']},
    {id:'site_poze',label:'Poze Site',roles:['owner','manager']},
    {id:'setari',label:'Setari culori',roles:['owner','manager']},
    {id:'registru',label:'Registru Casă',roles:['owner','manager']},
    {id:'haccp',label:'HACCP',roles:['owner','manager','casier']},
  ].filter(t=>t.roles.includes(employee.role))
  return <div style={{fontFamily:ff,background:F.bg,minHeight:'100vh',display:'flex',flexDirection:'column'}}>
    {showReset&&<Confirm msg="Resetezi toate rapoartele? Se vor sterge comenzile si pierderile." onYes={()=>{setOrders([]);setPierderi([]);setShowReset(false)}} onNo={()=>setShowReset(false)}/>}
    <div style={{background:grad('#0017C0','#0040cc'),padding:'0 18px',display:'flex',alignItems:'center',gap:10,height:50,flexShrink:0}}>
      <div style={{width:30,height:30,borderRadius:8,background:'rgba(255,255,255,0.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:800,color:'#fff'}}>V</div>
      <span style={{fontSize:14,fontWeight:700,color:'#fff',flex:1}}>VladimirSmash — Admin</span>
      <span style={{fontSize:12,color:'rgba(255,255,255,0.7)'}}>{employee.name}</span>
      {employee.role==='owner'&&<button onClick={()=>setShowReset(true)} style={{padding:'5px 13px',borderRadius:8,border:'1.5px solid rgba(255,200,200,0.5)',background:'rgba(192,57,43,0.3)',color:'#ffcccc',fontFamily:ff,fontSize:12,fontWeight:600,cursor:'pointer'}}>Reset rapoarte</button>}
      <button onClick={onPOS} style={{padding:'5px 13px',borderRadius:8,border:'1.5px solid rgba(255,255,255,0.35)',background:'transparent',color:'#fff',fontFamily:ff,fontSize:12,fontWeight:600,cursor:'pointer'}}>POS</button>
    </div>
    <div style={{background:F.surface,borderBottom:`1px solid ${F.border}`,padding:'0 18px',display:'flex',gap:2,flexShrink:0,overflowX:'auto'}}>
      {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'11px 13px',border:'none',borderBottom:tab===t.id?`3px solid ${F.primary}`:'3px solid transparent',background:'transparent',color:tab===t.id?F.primary:F.textMuted,fontFamily:ff,fontSize:13,fontWeight:tab===t.id?700:500,cursor:'pointer',whiteSpace:'nowrap'}}>{t.label}</button>)}
    </div>
    <div style={{flex:1,overflowY:'auto',padding:18}}>
      {tab==='vanzarile_mele'&&<VanzarileMeleTab employee={employee} orders={orders}/>}
      {tab==='rapoarte'&&<RapoarteTab orders={orders} employees={employees} products={products}/>}
      {tab==='profit'&&<ProfitTab orders={orders} products={products} stock={stock}/>}
      {tab==='produse'&&<ProduseTab products={products} setProducts={setProducts} cats={cats} setCats={setCats} stock={stock}/>}
      {tab==='meniuri'&&<MenuriTab menus={menus} setMenus={setMenus} products={products}/>}
      {tab==='gestiune'&&<GestiuneTab stock={stock} setStock={setStock}/>}
      {tab==='angajati'&&<AngajatiTab employees={employees} setEmployees={setEmployees} orders={orders} protocols={protocols} withdrawals={withdrawals} setWithdrawals={setWithdrawals}/>}
      {tab==='protocoale'&&<ProtocolTab protocols={protocols} employee={employee} employees={employees}/>}
      {tab==='pierderi'&&<PierderTab pierderi={pierderi} employee={employee} employees={employees}/>}
      {tab==='retrageri'&&<RetragerileTab employee={employee} withdrawals={withdrawals} setWithdrawals={setWithdrawals}/>}
      {tab==='tura'&&<TuraTab employee={employee} employees={employees} orders={orders}/>}
      {tab==='site_poze'&&<SitePozeTab/>}
      {tab==='setari'&&<SetariTab cats={cats} setCats={setCats} btnCfg={btnCfg} setBtnCfg={setBtnCfg}/>}

// ── VANZARILE MELE ────────────────────────────────────────────────────────────
function VanzarileMeleTab({employee,orders}){
  const today=new Date().toLocaleDateString('ro-RO')
  const mine=orders.filter(o=>o.emp_id===employee.id&&o.date===today)
  const total=mine.reduce((s,o)=>s+o.total,0),cash=mine.filter(o=>o.method==='cash').reduce((s,o)=>s+o.total,0),card=mine.filter(o=>o.method==='card').reduce((s,o)=>s+o.total,0)
  return <div style={{display:'flex',flexDirection:'column',gap:14}}>
    <div style={{fontSize:17,fontWeight:700,color:F.text}}>Vanzarile mele — {today}</div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
      <StatCard label="Comenzi" value={mine.length} from='#0017C0' to='#0066ff'/>
      <StatCard label="Cash" value={fmt(cash)} from='#1a7a3c' to='#30d158'/>
      <StatCard label="Card" value={fmt(card)} from='#0040cc' to='#007aff'/>
    </div>
    <div style={{background:grad('#0017C0','#0066ff'),borderRadius:14,padding:'16px 20px',boxShadow:'0 4px 14px #0017C066'}}>
      <div style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,0.75)',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:4}}>Total vanzari azi</div>
      <div style={{fontSize:28,fontWeight:800,color:'#fff'}}>{fmt(total)}</div>
    </div>
    <Card>{mine.length===0?<div style={{padding:24,textAlign:'center',color:F.textMuted}}>Nicio comanda azi.</div>:mine.map(o=>(
      <div key={o.id} style={{padding:'10px 14px',borderBottom:`1px solid ${F.border}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
          <span style={{fontSize:13,fontWeight:600,color:F.text}}>#{o.num} — {o.time}</span>
          <span style={{fontSize:11,padding:'2px 9px',borderRadius:999,background:o.method==='cash'?'#e3fff3':'#e8eeff',color:o.method==='cash'?'#1a7a3c':F.primary,fontWeight:700}}>{o.method.toUpperCase()}</span>
          <span style={{fontWeight:700,color:F.primary}}>{fmt(o.total)}</span>
        </div>
        <div style={{fontSize:11,color:F.textMuted,marginTop:3}}>{o.items.map(it=>`${it.name}×${it.qty}`).join(', ')}</div>
      </div>
    ))}</Card>
  </div>
}

// ── RAPOARTE ──────────────────────────────────────────────────────────────────
function RapoarteTab({orders,employees,products}){
  const [period,setPeriod]=useState('zi'),[startDate,setStartDate]=useState(new Date().toISOString().slice(0,10)),[endDate,setEndDate]=useState(new Date().toISOString().slice(0,10)),[selEmp,setSelEmp]=useState(null)
  const filtered=useMemo(()=>{
    const d=new Date(startDate)
    if(period==='zi') return orders.filter(o=>o.date===d.toLocaleDateString('ro-RO'))
    if(period==='sapt'){const w=getWeek(d);return orders.filter(o=>o.week===w)}
    if(period==='luna') return orders.filter(o=>o.month===d.getMonth()&&o.year===d.getFullYear())
    if(period==='an')   return orders.filter(o=>o.year===d.getFullYear())
    if(period==='custom'){const s=new Date(startDate),e=new Date(endDate);e.setHours(23,59,59);return orders.filter(o=>{const t=new Date(o.ts);return t>=s&&t<=e})}
    return orders
  },[orders,period,startDate,endDate])
  const total=filtered.reduce((s,o)=>s+o.total,0),cash=filtered.filter(o=>o.method==='cash').reduce((s,o)=>s+o.total,0),card=filtered.filter(o=>o.method==='card').reduce((s,o)=>s+o.total,0),vat=filtered.reduce((s,o)=>s+o.vat,0)
  const prodSales=useMemo(()=>{const map={};filtered.forEach(o=>o.items.forEach(it=>{if(!map[it.id])map[it.id]={id:it.id,name:it.name,qty:0,rev:0};map[it.id].qty+=it.qty;map[it.id].rev+=it.line_total}));return Object.values(map).sort((a,b)=>b.qty-a.qty)},[filtered])
  const empModal=selEmp?filtered.filter(o=>o.emp_id===selEmp.id):[]
  return <div style={{display:'flex',flexDirection:'column',gap:16}}>
    <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
      <div style={{fontSize:17,fontWeight:700,color:F.text,flex:1}}>Rapoarte vanzari</div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {[['zi','Zi'],['sapt','Sapt'],['luna','Luna'],['an','An'],['custom','Custom']].map(([k,l])=>(
          <button key={k} onClick={()=>setPeriod(k)} style={{padding:'7px 12px',borderRadius:8,border:'none',background:period===k?grad('#0017C0','#0066ff'):'#f5f5f7',color:period===k?'#fff':F.textSec,fontFamily:ff,fontSize:12,fontWeight:600,cursor:'pointer'}}>{l}</button>
        ))}
      </div>
      <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)} style={{padding:'7px 10px',border:`1px solid ${F.border}`,borderRadius:8,fontSize:13,fontFamily:ff}}/>
      {period==='custom'&&<><span style={{fontSize:12,color:F.textMuted}}>→</span><input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)} style={{padding:'7px 10px',border:`1px solid ${F.border}`,borderRadius:8,fontSize:13,fontFamily:ff}}/></>}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(145px,1fr))',gap:10}}>
      <StatCard label="Comenzi" value={filtered.length} from='#0017C0' to='#0066ff'/>
      <StatCard label="Venituri" value={fmt(total)} from='#1a7a3c' to='#30d158'/>
      <StatCard label="Cash" value={fmt(cash)} from='#1a7a3c' to='#28cd41'/>
      <StatCard label="Card" value={fmt(card)} from='#0040cc' to='#007aff'/>
    </div>
    {prodSales.length>0&&<Card style={{padding:16}}>
      <div style={{fontSize:14,fontWeight:700,color:F.text,marginBottom:10}}>Top produse vandute</div>
      {prodSales.slice(0,8).map((p,i)=>(
        <div key={p.id} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 0',borderBottom:`1px solid ${F.border}`}}>
          <div style={{width:22,height:22,borderRadius:6,background:i<3?grad('#0017C0','#0066ff'):'#f5f5f7',color:i<3?'#fff':F.textMuted,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,flexShrink:0}}>{i+1}</div>
          <span style={{flex:1,fontSize:13,fontWeight:600,color:F.text}}>{p.name}</span>
          <span style={{fontSize:12,color:F.textMuted}}>{p.qty} buc</span>
          <span style={{fontSize:12,fontWeight:700,color:F.primary}}>{fmt(p.rev)}</span>
        </div>
      ))}
    </Card>}
    <Card style={{padding:16}}>
      <div style={{fontSize:14,fontWeight:700,color:F.text,marginBottom:10}}>Vanzari per angajat <span style={{fontSize:11,color:F.textMuted}}>(click detalii)</span></div>
      {employees.map(emp=>{
        const eO=filtered.filter(o=>o.emp_id===emp.id)
        return <div key={emp.id} onClick={()=>setSelEmp(selEmp?.id===emp.id?null:emp)} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:`1px solid ${F.border}`,cursor:'pointer'}}>
          <div style={{width:32,height:32,borderRadius:9,background:grad(...ROLE_COLORS[emp.role]),display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:'#fff',flexShrink:0}}>{emp.name[0]}</div>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:F.text}}>{emp.name}</div><div style={{fontSize:11,color:F.textMuted}}>{eO.length} comenzi</div></div>
          <span style={{fontWeight:700,color:F.primary}}>{fmt(eO.reduce((s,o)=>s+o.total,0))}</span>
          <span style={{fontSize:11,color:F.textMuted}}>{selEmp?.id===emp.id?'▲':'▼'}</span>
        </div>
      })}
    </Card>
    {selEmp&&<Modal onClose={()=>setSelEmp(null)}>
      <div style={{fontSize:16,fontWeight:700,color:F.text,marginBottom:4}}>{selEmp.name}</div>
      <div style={{fontSize:12,color:F.textMuted,marginBottom:14}}>{empModal.length} comenzi | {fmt(empModal.reduce((s,o)=>s+o.total,0))}</div>
      {empModal.slice(0,20).map(o=>(
        <div key={o.id} style={{padding:'8px 0',borderBottom:`1px solid ${F.border}`}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:13,fontWeight:600}}>
            <span>#{o.num} — {o.date} {o.time||''}</span>
            <div style={{display:'flex',gap:8}}>
              <span style={{fontSize:11,padding:'2px 8px',borderRadius:999,background:o.method==='cash'?'#e3fff3':'#e8eeff',color:o.method==='cash'?'#1a7a3c':F.primary,fontWeight:700}}>{o.method.toUpperCase()}</span>
              <span style={{fontWeight:700,color:F.primary}}>{fmt(o.total)}</span>
            </div>
          </div>
          <div style={{fontSize:11,color:F.textMuted,marginTop:2}}>{o.items.map(it=>`${it.name}×${it.qty}`).join(', ')}</div>
        </div>
      ))}
    </Modal>}
  </div>
}

// ── PROFIT TAB ────────────────────────────────────────────────────────────────
function ProfitTab({orders,products,stock}){
  const [start,setStart]=useState(new Date().toISOString().slice(0,10)),[end,setEnd]=useState(new Date().toISOString().slice(0,10)),[impozit,setImpozit]=useState(10)
  const filtered=useMemo(()=>{const s=new Date(start);s.setHours(0,0,0,0);const e=new Date(end);e.setHours(23,59,59,999);return orders.filter(o=>{const t=new Date(o.ts);return t>=s&&t<=e})},[orders,start,end])
  const nrZile=Math.max(1,Math.round((new Date(end)-new Date(start))/86400000)+1)
  const venituri=filtered.reduce((s,o)=>s+o.subtotal,0)
  const cash=filtered.filter(o=>o.method==='cash').reduce((s,o)=>s+o.subtotal,0)
  const card=filtered.filter(o=>o.method==='card').reduce((s,o)=>s+o.subtotal,0)
  const costMP=useMemo(()=>filtered.reduce((sum,o)=>sum+o.items.reduce((s,it)=>{const p=products.find(p=>p.id===it.id);return s+(p?calcProductCost(p,stock):0)*it.qty},0),0),[filtered,products,stock])
  const perProd=useMemo(()=>{const map={};filtered.forEach(o=>o.items.forEach(it=>{const p=products.find(p=>p.id===it.id);const cost=p?calcProductCost(p,stock):0;if(!map[it.id])map[it.id]={name:it.name,qty:0,venit:0,cost:0,profit:0};map[it.id].qty+=it.qty;map[it.id].venit+=it.price*it.qty;map[it.id].cost+=cost*it.qty;map[it.id].profit+=(it.price-cost)*it.qty}));return Object.values(map).sort((a,b)=>(b.venit>0?b.profit/b.venit:0)-(a.venit>0?a.profit/a.venit:0))},[filtered,products,stock])
  const profitBrut=venituri-costMP,impozitSuma=Math.max(0,profitBrut*impozit/100),profitNet=profitBrut-impozitSuma
  const marjaBruta=venituri>0?profitBrut/venituri*100:0,marjaNet=venituri>0?profitNet/venituri*100:0
  return <div style={{display:'flex',flexDirection:'column',gap:16}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
      <div style={{fontSize:17,fontWeight:700,color:F.text}}>Raport Profit — PFA</div>
      <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
        {[['Azi',()=>{const t=new Date().toISOString().slice(0,10);setStart(t);setEnd(t)}],['7 zile',()=>{const e=new Date(),s=new Date(e-6*86400000);setStart(s.toISOString().slice(0,10));setEnd(e.toISOString().slice(0,10))}],['Luna',()=>{const n=new Date(),s=new Date(n.getFullYear(),n.getMonth(),1);setStart(s.toISOString().slice(0,10));setEnd(n.toISOString().slice(0,10))}],['An',()=>{const n=new Date(),s=new Date(n.getFullYear(),0,1);setStart(s.toISOString().slice(0,10));setEnd(n.toISOString().slice(0,10))}]].map(([l,fn])=>(
          <button key={l} onClick={fn} style={{padding:'6px 12px',borderRadius:8,border:`1px solid ${F.border}`,background:'#f5f5f7',fontFamily:ff,fontSize:12,fontWeight:600,color:F.textSec,cursor:'pointer'}}>{l}</button>
        ))}
        <input type="date" value={start} onChange={e=>setStart(e.target.value)} style={{padding:'7px 10px',border:`1px solid ${F.border}`,borderRadius:8,fontSize:13,fontFamily:ff}}/>
        <span style={{fontSize:13,color:F.textMuted}}>→</span>
        <input type="date" value={end} onChange={e=>setEnd(e.target.value)} style={{padding:'7px 10px',border:`1px solid ${F.border}`,borderRadius:8,fontSize:13,fontFamily:ff}}/>
      </div>
    </div>
    <Card style={{padding:'12px 16px',display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
      <div style={{fontSize:13,fontWeight:700,color:F.text}}>Impozit PFA:</div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        {[10,16,25].map(p=><button key={p} onClick={()=>setImpozit(p)} style={{padding:'6px 14px',borderRadius:8,border:'none',background:impozit===p?grad('#0017C0','#0066ff'):'#f5f5f7',color:impozit===p?'#fff':F.textSec,fontFamily:ff,fontSize:13,fontWeight:700,cursor:'pointer'}}>{p}%</button>)}
        <div style={{display:'flex',alignItems:'center',gap:4}}>
          <input type="number" value={impozit} min={0} max={100} onChange={e=>setImpozit(Math.min(100,Math.max(0,+e.target.value)))} style={{width:56,padding:'6px 8px',border:`1px solid ${F.border}`,borderRadius:8,fontSize:13,fontFamily:ff,textAlign:'center'}}/>
          <span style={{fontSize:13,color:F.textMuted}}>%</span>
        </div>
      </div>
      <div style={{fontSize:12,color:F.textMuted,marginLeft:'auto'}}>{nrZile} zile · {filtered.length} comenzi</div>
    </Card>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(148px,1fr))',gap:10}}>
      <StatCard label="Venituri vanzari" value={fmt(venituri)} from='#0017C0' to='#0066ff'/>
      <StatCard label="Cost materie prima" value={fmt(costMP)} from='#c0392b' to='#ff3b30'/>
      <StatCard label="Profit brut" value={fmt(profitBrut)} sub={`${marjaBruta.toFixed(1)}%`} from={profitBrut>=0?'#1a7a3c':'#c0392b'} to={profitBrut>=0?'#30d158':'#ff3b30'}/>
      <StatCard label={`Impozit PFA ${impozit}%`} value={fmt(impozitSuma)} from='#b35a00' to='#ff9f0a'/>
      <StatCard label="PROFIT NET" value={fmt(profitNet)} sub={`${marjaNet.toFixed(1)}%`} from={profitNet>=0?'#1a7a3c':'#c0392b'} to={profitNet>=0?'#30d158':'#ff3b30'}/>
      <StatCard label="Profit net / zi" value={fmt(nrZile>0?profitNet/nrZile:0)} from='#6e1a8b' to='#bf5af2'/>
    </div>
    <Card style={{padding:20}}>
      <div style={{fontSize:14,fontWeight:700,color:F.text,marginBottom:14}}>Calcul detaliat</div>
      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:18,padding:'14px 16px',background:'#f9faff',borderRadius:12,border:`1px solid ${F.border}`}}>
        {[['Venituri',fmt(venituri),'#0017C0'],['−','',''],['Cost MP',fmt(costMP),'#c0392b'],['=','',''],['Profit brut',fmt(profitBrut),'#1a7a3c'],['−','',''],[`Impozit ${impozit}%`,fmt(impozitSuma),'#b35a00'],['=','','']].map((r,i)=>r[0]==='−'||r[0]==='='?<div key={i} style={{fontSize:20,color:F.textMuted,fontWeight:300}}>{r[0]}</div>:<div key={i} style={{textAlign:'center'}}><div style={{fontSize:11,color:F.textMuted,fontWeight:600,textTransform:'uppercase'}}>{r[0]}</div><div style={{fontSize:16,fontWeight:800,color:r[2]}}>{r[1]}</div></div>)}
        <div style={{textAlign:'center',padding:'8px 14px',background:profitNet>=0?'#e3fff3':'#fff2f1',borderRadius:10,border:`2px solid ${profitNet>=0?'#1a7a3c':'#c0392b'}`}}>
          <div style={{fontSize:11,color:profitNet>=0?'#1a7a3c':'#c0392b',fontWeight:700,textTransform:'uppercase'}}>Profit net</div>
          <div style={{fontSize:22,fontWeight:800,color:profitNet>=0?'#1a7a3c':'#c0392b'}}>{fmt(profitNet)}</div>
        </div>
      </div>
      {[{label:'Venituri',val:venituri,color:grad('#0017C0','#0066ff')},{label:'Cost MP',val:costMP,color:grad('#c0392b','#ff3b30')},{label:'Profit brut',val:profitBrut,color:grad('#1a7a3c','#30d158')},{label:`Impozit ${impozit}%`,val:impozitSuma,color:grad('#b35a00','#ff9f0a')},{label:'Profit net',val:profitNet,color:grad('#1a7a3c','#00c96e')}].map(r=>(
        <div key={r.label} style={{marginBottom:10}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}><span style={{fontSize:12,fontWeight:600,color:F.text}}>{r.label}</span><span style={{fontSize:12,fontWeight:700,color:F.text}}>{fmt(r.val)}</span></div>
          <div style={{height:8,background:'#eee',borderRadius:4,overflow:'hidden'}}><div style={{height:'100%',width:`${Math.min(100,venituri>0?Math.abs(r.val)/venituri*100:0)}%`,background:r.color,borderRadius:4}}/></div>
        </div>
      ))}
      <div style={{marginTop:14,padding:'14px 18px',background:grad('#b35a00','#ff9f0a'),borderRadius:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:'#fff'}}>De platit la stat — impozit PFA {impozit}%</div>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.8)'}}>Calculat din profitul brut al perioadei</div>
        </div>
        <div style={{fontSize:26,fontWeight:800,color:'#fff'}}>{fmt(impozitSuma)}</div>
      </div>
      <div style={{marginTop:12,display:'flex',gap:10}}>
        <div style={{flex:1,background:grad('#1a7a3c','#30d158'),borderRadius:10,padding:'10px 14px'}}><div style={{fontSize:10,color:'rgba(255,255,255,0.75)',fontWeight:700,textTransform:'uppercase'}}>Cash</div><div style={{fontSize:18,fontWeight:800,color:'#fff'}}>{fmt(cash)}</div><div style={{fontSize:11,color:'rgba(255,255,255,0.8)'}}>{venituri>0?(cash/venituri*100).toFixed(1):0}%</div></div>
        <div style={{flex:1,background:grad('#0040cc','#007aff'),borderRadius:10,padding:'10px 14px'}}><div style={{fontSize:10,color:'rgba(255,255,255,0.75)',fontWeight:700,textTransform:'uppercase'}}>Card</div><div style={{fontSize:18,fontWeight:800,color:'#fff'}}>{fmt(card)}</div><div style={{fontSize:11,color:'rgba(255,255,255,0.8)'}}>{venituri>0?(card/venituri*100).toFixed(1):0}%</div></div>
      </div>
    </Card>
    {perProd.length>0&&<Card style={{padding:16}}>
      <div style={{fontSize:14,fontWeight:700,color:F.text,marginBottom:10}}>Profit per produs</div>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr 1fr',gap:4,padding:'6px 0',borderBottom:`2px solid ${F.border}`,marginBottom:4}}>
        {['Produs','Buc','Venit','Cost MP','Profit','Marja'].map(h=><div key={h} style={{fontSize:10,fontWeight:700,color:F.textMuted,textTransform:'uppercase'}}>{h}</div>)}
      </div>
      {perProd.map((p,i)=>{const m=p.venit>0?Math.round(p.profit/p.venit*100):0,mc=m>50?'#1a7a3c':m>25?'#b35a00':'#c0392b',mb=m>50?'#e3fff3':m>25?'#fff8ee':'#fff2f1'
        return <div key={i} style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr 1fr',gap:4,padding:'7px 0',borderBottom:`1px solid ${F.border}`,alignItems:'center'}}>
          <span style={{fontSize:12,fontWeight:600,color:F.text}}>{p.name}</span>
          <span style={{fontSize:12,color:F.textMuted}}>{p.qty}</span>
          <span style={{fontSize:12,color:F.textSec}}>{fmt(p.venit)}</span>
          <span style={{fontSize:12,color:'#c0392b'}}>-{fmt(p.cost)}</span>
          <span style={{fontSize:12,fontWeight:700,color:p.profit>=0?F.primary:'#c0392b'}}>{fmt(p.profit)}</span>
          <span style={{fontSize:11,padding:'2px 7px',borderRadius:999,background:mb,color:mc,fontWeight:700,textAlign:'center'}}>{m}%</span>
        </div>
      })}
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr 1fr',gap:4,padding:'10px 0 4px',borderTop:`2px solid ${F.border}`,marginTop:4}}>
        <span style={{fontSize:13,fontWeight:800,color:F.text}}>TOTAL</span>
        <span style={{fontSize:12,fontWeight:700}}>{perProd.reduce((s,p)=>s+p.qty,0)}</span>
        <span style={{fontSize:12,fontWeight:700}}>{fmt(perProd.reduce((s,p)=>s+p.venit,0))}</span>
        <span style={{fontSize:12,fontWeight:700,color:'#c0392b'}}>-{fmt(perProd.reduce((s,p)=>s+p.cost,0))}</span>
        <span style={{fontSize:13,fontWeight:800,color:F.primary}}>{fmt(perProd.reduce((s,p)=>s+p.profit,0))}</span>
        <span style={{fontSize:12,fontWeight:700,color:marjaBruta>50?'#1a7a3c':marjaBruta>25?'#b35a00':'#c0392b'}}>{marjaBruta.toFixed(1)}%</span>
      </div>
    </Card>}
  </div>
}

// ── PRODUSE ───────────────────────────────────────────────────────────────────
function ProduseTab({products,setProducts,cats,setCats,stock}){
  const {ask,el}=useConfirm()
  const [editProd,setEditProd]=useState(null),[showCats,setShowCats]=useState(false)
  const [uploading,setUploading]=useState(null)
  const stockKeys=Object.keys(stock)
  const updProd=(id,k,v)=>setProducts(p=>p.map(x=>x.id===id?{...x,[k]:v}:x))
  const addRec=id=>setProducts(p=>p.map(x=>x.id===id?{...x,recipe:[...(x.recipe??[]),{ing:stockKeys[0]??'',qty:1,unit:'g'}]}:x))
  const updRec=(id,i,k,v)=>setProducts(p=>p.map(x=>x.id===id?{...x,recipe:x.recipe.map((r,j)=>j===i?{...r,[k]:v}:r)}:x))
  const delRec=async(id,i)=>{if(await ask('Stergi acest ingredient?'))setProducts(p=>p.map(x=>x.id===id?{...x,recipe:x.recipe.filter((_,j)=>j!==i)}:x))}
  const delProd=async(id)=>{if(await ask('Stergi produsul?'))setProducts(p=>p.filter(x=>x.id!==id))}
  const uploadImg=async(pid,file)=>{
    if(!sb){alert('Supabase indisponibil.');return}
    setUploading(pid)
    try{
      const ext=(file.name.split('.').pop()||'jpg').toLowerCase()
      const path=`prod-${pid}.${ext}`
      const{error}=await sb.storage.from('product-images').upload(path,file,{upsert:true,contentType:file.type})
      if(error){alert('Eroare upload: '+error.message);return}
      const{data}=sb.storage.from('product-images').getPublicUrl(path)
      updProd(pid,'img',data.publicUrl+'?t='+Date.now())
    }catch(e){alert('Eroare: '+e.message)}
    finally{setUploading(null)}
  }
  const removeImg=async(pid,imgUrl)=>{
    if(sb&&imgUrl){
      const parts=imgUrl.split('/product-images/')
      if(parts[1]) await sb.storage.from('product-images').remove([parts[1].split('?')[0]]).catch(()=>{})
    }
    updProd(pid,'img',null)
  }
  return <div style={{display:'flex',flexDirection:'column',gap:14}}>
    {el}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
      <div style={{fontSize:17,fontWeight:700,color:F.text}}>Produse ({products.length})</div>
      <div style={{display:'flex',gap:8}}>
        <GBtn from='#6e1a8b' to='#bf5af2' onClick={()=>setShowCats(true)} style={{padding:'8px 14px',fontSize:12}}>Categorii</GBtn>
        <GBtn from='#0017C0' to='#0066ff' onClick={()=>{const p={id:Date.now(),name:'Produs nou',price:0,cat:cats[0]?.id,img:null,unit:'buc',available:true,recipe:[]};setProducts(pr=>[...pr,p]);setEditProd(p.id)}} style={{padding:'8px 14px',fontSize:12}}>+ Produs nou</GBtn>
      </div>
    </div>
    <Card>
      {products.map(p=>{
        const cat=cats.find(c=>c.id===p.cat)??cats[0],cost=calcProductCost(p,stock),margin=p.price>0?Math.round((p.price-cost)/p.price*100):0
        return <div key={p.id}>

// ── ANGAJATI ──────────────────────────────────────────────────────────────────
function AngajatiTab({employees,setEmployees,orders,protocols,withdrawals,setWithdrawals}){
  const {ask,el}=useConfirm()
  const [selEmp,setSelEmp]=useState(null),[period,setPeriod]=useState('zi'),[startDate,setStartDate]=useState(new Date().toISOString().slice(0,10)),[endDate,setEndDate]=useState(new Date().toISOString().slice(0,10)),[showW,setShowW]=useState(null),[wForm,setWForm]=useState({suma:0,motiv:''})
  const upd=(id,k,v)=>setEmployees(p=>p.map(e=>e.id===id?{...e,[k]:v}:e))
  const fo=useMemo(()=>{
    const d=new Date(startDate)
    if(period==='zi') return orders.filter(o=>o.date===d.toLocaleDateString('ro-RO'))
    if(period==='sapt'){const w=getWeek(d);return orders.filter(o=>o.week===w)}
    if(period==='luna') return orders.filter(o=>o.month===d.getMonth()&&o.year===d.getFullYear())
    if(period==='an')   return orders.filter(o=>o.year===d.getFullYear())
    if(period==='custom'){const s=new Date(startDate),e=new Date(endDate);e.setHours(23,59,59);return orders.filter(o=>{const t=new Date(o.ts);return t>=s&&t<=e})}

// ── TURA ──────────────────────────────────────────────────────────────────────
function TuraTab({employee,employees,orders}){
  const [ture,setTure]=useState({}), [report,setReport]=useState(null)
  const today=new Date().toLocaleDateString('ro-RO'),todayOrd=orders.filter(o=>o.date===today)
  const isCasier=employee.role==='casier'
  const eligible=isCasier?employees.filter(e=>e.id===employee.id):employees.filter(e=>e.role!=='owner'&&e.active)
  const open=empId=>setTure(p=>({...p,[empId]:{open:true,start:new Date().toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'})}}))
  const close=(empId,type)=>{
    const emp=employees.find(e=>e.id===empId),eO=todayOrd.filter(o=>o.emp_id===empId),total=eO.reduce((s,o)=>s+o.total,0)
    setTure(p=>({...p,[empId]:{open:type==='X',start:p[empId]?.start}}))
    setReport({type,empName:emp?.name,start:ture[empId]?.start,end:new Date().toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'}),comenzi:eO.length,total,cash:eO.filter(o=>o.method==='cash').reduce((s,o)=>s+o.total,0),card:eO.filter(o=>o.method==='card').reduce((s,o)=>s+o.total,0),vat:eO.reduce((s,o)=>s+o.vat,0)})
  }
  return <div style={{display:'flex',flexDirection:'column',gap:14}}>
    <div style={{fontSize:17,fontWeight:700,color:F.text}}>{isCasier?'Tura mea':'Gestionare ture angajati'}</div>
    {!isCasier&&<div style={{fontSize:12,color:F.textMuted,background:'#e8eeff',borderRadius:8,padding:'8px 12px'}}>Ca owner/manager, gestionezi turele angajatilor.</div>}
    <Card>
      {eligible.map(emp=>{
        const t=ture[emp.id],eO=todayOrd.filter(o=>o.emp_id===emp.id)
        return <div key={emp.id} style={{display:'flex',alignItems:'center',gap:12,padding:'14px',borderBottom:`1px solid ${F.border}`}}>
          <div style={{width:36,height:36,borderRadius:9,background:grad(...ROLE_COLORS[emp.role]),display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800,fontSize:15,flexShrink:0}}>{emp.name[0]}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600,color:F.text}}>{isCasier?'Tura ta':emp.name}</div>
            <div style={{fontSize:11,color:F.textMuted}}>{eO.length} comenzi azi — {fmt(eO.reduce((s,o)=>s+o.total,0))}</div>
            {t?.open?<div style={{fontSize:11,color:'#1a7a3c',fontWeight:600}}>Deschisa de la {t.start}</div>:<div style={{fontSize:11,color:F.textMuted}}>Inchisa</div>}
          </div>
          <div style={{display:'flex',gap:7}}>
            {!t?.open?<GBtn from='#1a7a3c' to='#30d158' onClick={()=>open(emp.id)} style={{padding:'9px 16px',fontSize:13}}>Deschide Tura</GBtn>
            :<><GBtn from='#b35a00' to='#ff9f0a' onClick={()=>close(emp.id,'X')} style={{padding:'9px 12px',fontSize:13}}>Raport X</GBtn><GBtn from='#0017C0' to='#0066ff' onClick={()=>close(emp.id,'Z')} style={{padding:'9px 12px',fontSize:13}}>Raport Z</GBtn></>}
          </div>
        </div>
      })}
    </Card>
    {report&&<Modal onClose={()=>setReport(null)}>
      <div style={{textAlign:'center',marginBottom:16}}>
        <div style={{display:'inline-block',padding:'4px 14px',borderRadius:999,background:report.type==='Z'?grad('#0017C0','#0066ff'):grad('#b35a00','#ff9f0a'),color:'#fff',fontSize:13,fontWeight:700,marginBottom:8}}>RAPORT {report.type}</div>
        <div style={{fontSize:16,fontWeight:700,color:F.text}}>VladimirSmash</div>

  const setMT=(k,v)=>setManTemps(p=>({...p,[k]:parseFloat(v)||0}))
  const dateRO=new Date(selDate+'T12:00:00').toLocaleDateString('ro-RO')
  const dayData=haccpData[dateRO]||{readings:[],oil_changes:[]}

  const oilChanges=dayData.oil_changes||[]

    {k:'masa_rece',label:'🧊 Masă rece',min:2,max:4},
    {k:'salatiera',label:'🥗 Salatiéra',min:3,max:8},

    const now=new Date(),t=now.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'})

    setHaccpData(p=>({...p,[dateRO]:{...dayData,oil_changes:[...(dayData.oil_changes||[]),entry]}}))
    setShowAddOil(false)
  }
  const addManualReading=()=>{
    const now=new Date(),t=now.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'})
    const r={id:Date.now(),slot:'manual',time:t,masa_rece:manTemps.masa_rece,salatiera:manTemps.salatiera,congelator:manTemps.congelator,frigider_sosuri:manTemps.frigider_sosuri,confirmed_by:'manual',manual_entry:true}

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
          {EQUIP.map(eq=>{
            const v=manTemps[eq.k],inRange=v>=eq.min&&v<=eq.max
            return <div key={eq.k} style={{background:inRange?'#f0fff5':'#fff',borderRadius:8,padding:'9px 11px',border:`1.5px solid ${inRange?'#a8f0c8':'#e2e8ff'}`}}>

    </Card>
    <Card style={{padding:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div style={{fontSize:14,fontWeight:700,color:F.text}}>Schimburi ulei — {dateRO}</div>

        :oilChanges.map(o=><div key={o.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:`1px solid ${F.border}`}}>

        <div style={{display:'flex',gap:7}}>

// ── POZE SITE ──────────────────────────────────────────────────────────────
function SitePozeTab(){
  const BUCKET='product-images'
  const SB_PUB=SUPABASE_URL+'/storage/v1/object/public/'+BUCKET
  const [heroUrl,setHeroUrl]=useState(null)
  const [aboutUrl,setAboutUrl]=useState(null)
  const [heroStatus,setHeroStatus]=useState('')
  const [aboutStatus,setAboutStatus]=useState('')
  const [heroLoading,setHeroLoading]=useState(false)
  const [aboutLoading,setAboutLoading]=useState(false)
  const heroInput=useRef(), aboutInput=useRef()

  useEffect(()=>{
    const nc='?nc='+Date.now()
    fetch(SB_PUB+'/site/hero-url.txt'+nc).then(r=>r.ok?r.text():null).then(u=>{if(u&&u.startsWith('http'))setHeroUrl(u.trim())}).catch(()=>{})
    fetch(SB_PUB+'/site/about-url.txt'+nc).then(r=>r.ok?r.text():null).then(u=>{if(u&&u.startsWith('http'))setAboutUrl(u.trim())}).catch(()=>{})
  },[])

  // Transcodează la JPEG pentru URL fix (fără extensie variabilă)
  async function toJpeg(file){
    const img=await createImageBitmap(file)
    const c=document.createElement('canvas')
    c.width=img.width; c.height=img.height
    c.getContext('2d').drawImage(img,0,0)
    return await new Promise(res=>c.toBlob(res,'image/jpeg',0.85))
  }

  async function upload(file,storagePath,setUrl,setStatus,setLoading){
    if(!file||!sb) return
    setLoading(true); setStatus('Se procesează…')
    try{
      const jpeg=await toJpeg(file)
      const imgPath=storagePath+'.jpg'
      const{error}=await sb.storage.from(BUCKET).upload(imgPath,jpeg,{upsert:true,contentType:'image/jpeg'})
      if(error) throw new Error(error.message)
      const{data}=sb.storage.from(BUCKET).getPublicUrl(imgPath)
      const url=data.publicUrl+'?t='+Date.now()
      // Salvează URL în fișier text (fără pos_store, fără RLS)
      const txt=new Blob([url],{type:'text/plain'})
      await sb.storage.from(BUCKET).upload(storagePath+'-url.txt',txt,{upsert:true,contentType:'text/plain'})
      // Actualizează pos_store cu noul URL (UPDATE direct, rândul există)
      const _storeKey=storagePath.replace('site/','site_')+'_image'
      const _upd=await sb.from('pos_store')
        .update({value:url,updated_at:new Date().toISOString()})
        .eq('restaurant_id',RESTAURANT_ID).eq('store_key',_storeKey)
      if(_upd.error) console.warn('[POS site-poze] pos_store update error:',_upd.error.message)
      else console.log('[POS site-poze] pos_store updated ok:',_storeKey,url)
      setUrl(url); setStatus('✓ Salvat! Apare pe site în câteva secunde.')
      setTimeout(()=>setStatus(''),3000)
    }catch(e){ setStatus('Eroare: '+e.message) }
    finally{ setLoading(false) }
  }

  async function remove(storagePath,setUrl,setStatus){
    if(!sb||!window.confirm('Ești sigur că vrei să ștergi poza?')) return
    await sb.storage.from(BUCKET).remove([storagePath+'.jpg',storagePath+'-url.txt']).catch(()=>{})
    setUrl(null); setStatus('Poză ștearsă.')
    setTimeout(()=>setStatus(''),2000)
  }

  const card=(label,desc,url,status,loading,inputRef,storagePath,setUrl,setStatus,setLoading)=>(
    <div style={{background:F.surface,borderRadius:16,border:`1px solid ${F.border}`,overflow:'hidden'}}>
      <div style={{padding:'14px 18px',borderBottom:`1px solid ${F.border}`,display:'flex',alignItems:'center',gap:12}}>
        <div style={{width:38,height:38,borderRadius:10,background:'#eef0ff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🖼️</div>
        <div>
          <div style={{fontWeight:700,fontSize:14,color:F.text}}>{label}</div>
          <div style={{fontSize:12,color:F.textMuted}}>{desc}</div>
        </div>
      </div>
      {url
        ?<div style={{margin:16,borderRadius:12,overflow:'hidden',background:'#f5f5f7',aspectRatio:'16/7',position:'relative'}}>
            <img src={url} alt="" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
          </div>
        :<div style={{margin:16,borderRadius:12,background:'#f5f5f7',aspectRatio:'16/7',display:'flex',alignItems:'center',justifyContent:'center',color:F.textMuted,fontSize:13}}>
            Nicio poză încă
          </div>
      }
      <div style={{padding:'12px 16px 16px',display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
        <button disabled={loading} onClick={()=>inputRef.current&&inputRef.current.click()}
          style={{display:'flex',alignItems:'center',gap:7,padding:'10px 18px',borderRadius:10,border:'none',background:F.primary,color:'#fff',fontWeight:700,fontSize:13,cursor:'pointer',opacity:loading?.6:1}}>
          ⬆ {loading?'Se încarcă…':url?'Schimbă poza':'Încarcă poza'}
        </button>
        {url&&<button onClick={()=>remove(storagePath,setUrl,setStatus)}
          style={{padding:'9px 14px',borderRadius:10,border:`1.5px solid ${F.border}`,background:'none',color:F.textMuted,fontSize:13,cursor:'pointer',fontWeight:600}}>
          Șterge
        </button>}
        {status&&<span style={{fontSize:12,fontWeight:600,color:status.startsWith('✓')?'#1a7a47':status.startsWith('Eroare')?'#c0341f':F.primary}}>{status}</span>}
      </div>
      <input ref={inputRef} type="file" accept="image/*"
        style={{position:'fixed',top:-300,left:-300,opacity:0,width:1,height:1}}
        onChange={e=>{const f=e.target.files&&e.target.files[0];if(f)upload(f,storagePath,setUrl,setStatus,setLoading);e.target.value=''}}/>
    </div>
  )

  return <div style={{display:'flex',flexDirection:'column',gap:20,maxWidth:640}}>
    <div>
      <div style={{fontWeight:800,fontSize:18,color:F.text,marginBottom:4}}>Poze Site</div>
      <div style={{fontSize:13,color:F.textMuted}}>Pozele încărcate apar automat pe <b>vladimir-smash.vercel.app</b> în câteva secunde.</div>
    </div>
    {card('Poza hero (fundal principal)','Poza mare de pe prima pagină',heroUrl,heroStatus,heroLoading,heroInput,'site/hero',setHeroUrl,setHeroStatus,setHeroLoading)}
    {card('Poza „Despre noi"','Poza din secțiunea cu povestea restaurantului',aboutUrl,aboutStatus,aboutLoading,aboutInput,'site/about',setAboutUrl,setAboutStatus,setAboutLoading)}
  </div>
}
